const svg = document.getElementById("diagram"), inspector = document.getElementById("inspector"), statusEl = document.getElementById("saveStatus");
let state = structuredClone(INITIAL_DATA), sceneId = "newUser", selected = null, edgeMode = null, history = [], future = [], fileHandle = null;
const W=1180, H=1040, laneW=285, left=20, headerH=64;
const el = (tag, attrs={}, text="") => { const n=document.createElementNS("http://www.w3.org/2000/svg",tag); Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v)); if(text) n.textContent=text; return n; };
const scene = () => state.scenes[sceneId];
const edges = () => scene().edges.map((e,i)=>({id:`edge-${i}`,from:e[0],to:e[1],label:e[2],style:e[3]}));
const nodeById = id => scene().nodes.find(n=>n.id===id);
const laneIndex = id => state.lanes.findIndex(l=>l.id===id);
function snapshot(){ history.push(JSON.stringify(state)); if(history.length>50) history.shift(); future=[]; }
function restore(raw){ state=JSON.parse(raw); selected=null; render(); }
function undo(){ if(!history.length)return; future.push(JSON.stringify(state)); restore(history.pop()); }
function redo(){ if(!future.length)return; history.push(JSON.stringify(state)); restore(future.pop()); }
function fitScene(){ return sceneId==="existingUser" ? 1250 : 1080; }
function anchor(a,b){
  const ax=a.x+a.w/2, ay=a.y+a.h/2, bx=b.x+b.w/2, by=b.y+b.h/2;
  if(Math.abs(bx-ax)>Math.abs(by-ay)) return bx>ax?{x:a.x+a.w,y:ay}:{x:a.x,y:ay};
  return by>ay?{x:ax,y:a.y+a.h}:{x:ax,y:a.y};
}
function edgePath(a,b){
  const p=anchor(a,b), q=anchor(b,a);
  if(Math.abs(q.x-p.x)>80) { const m=(p.x+q.x)/2; return `M${p.x} ${p.y} H${m} V${q.y} H${q.x}`; }
  const m=(p.y+q.y)/2; return `M${p.x} ${p.y} V${m} H${q.x} V${q.y}`;
}
function render(){
  const s=scene(); const height=Math.max(H, fitScene()); svg.setAttribute("viewBox",`0 0 ${W} ${height}`); svg.setAttribute("height",height);
  svg.innerHTML=`<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10Z" fill="#64748b"/></marker><marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10Z" fill="#dc2626"/></marker><marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10Z" fill="#059669"/></marker></defs>`;
  state.lanes.forEach((lane,i)=>{ const x=left+i*laneW; svg.append(el("rect",{x,y:headerH,width:laneW,height:height-headerH-16,fill:lane.fill})); svg.append(el("rect",{x,y:16,width:laneW,height:48,rx:10,fill:lane.color})); svg.append(el("text",{x:x+laneW/2,y:45,"text-anchor":"middle",class:"lane-label"},lane.label)); if(i)svg.append(el("line",{x1:x,y1:headerH,x2:x,y2:height-16,stroke:"#e2e8f0"})); });
  svg.append(el("rect",{x:left,y:headerH,width:1140,height:height-headerH-16,fill:"none",stroke:"#dbe2ea"}));
  svg.append(el("text",{x:46,y:99,class:"lane-caption"},s.title));
  svg.append(el("text",{x:46,y:119,fill:"#64748b","font-size":"11"},s.subtitle));
  const firstPost = Math.min(...s.nodes.filter(n=>n.y>750).map(n=>n.y), height); if(firstPost<height) { svg.append(el("line",{x1:20,y1:firstPost-40,x2:1160,y2:firstPost-40,stroke:"#cbd5e1","stroke-dasharray":"6 5"})); }
  edges().forEach(ed=>{ const a=nodeById(ed.from),b=nodeById(ed.to); if(!a||!b)return; const color=ed.style==="money"?"#059669":ed.style==="error"?"#dc2626":"#64748b"; const path=el("path",{d:edgePath(a,b),fill:"none",stroke:color,"stroke-width":selected?.kind==="edge"&&selected.id===ed.id?3:1.7,"stroke-dasharray":ed.style==="dashed"||ed.style==="error"?"6 4":"",class:"edge","marker-end":`url(#${ed.style==="money"?"arrow-green":ed.style==="error"?"arrow-red":"arrow"})`}); path.onclick=e=>{e.stopPropagation();selected={kind:"edge",id:ed.id};edgeMode=null;render();};svg.append(path); if(ed.label){ const p=anchor(a,b),q=anchor(b,a),x=(p.x+q.x)/2,y=(p.y+q.y)/2-7;svg.append(el("text",{x,y,"text-anchor":"middle",class:`edge-label ${ed.label.startsWith("是")?"branch-yes":ed.label.startsWith("否")?"branch-no":""}`},ed.label)); } });
  s.nodes.forEach(n=>renderNode(n)); renderInspector();
}
function renderNode(n){
  const g=el("g",{class:`node ${selected?.kind==="node"&&selected.id===n.id?"selected":""}`,"data-id":n.id}); let shape;
  if(n.type==="decision"){ const cx=n.x+n.w/2,cy=n.y+n.h/2; shape=el("polygon",{points:`${cx},${n.y} ${n.x+n.w},${cy} ${cx},${n.y+n.h} ${n.x},${cy}`,class:"shape",fill:"#fff7ed",stroke:"#f59e0b","stroke-width":1.5}); }
  else { shape=el("rect",{x:n.x,y:n.y,width:n.w,height:n.h,rx:n.type==="terminal"?n.h/2:4,class:"shape",fill:n.type==="terminal"?(n.title.includes("结束")?"#047857":"#334155"):(n.lane==="app"?"#fdf0f5":n.lane==="wechatClient"?"#eafaf1":n.lane==="wechatServer"?"#e7f6ee":"#f1f4f8"),stroke:n.type==="terminal"?"none":(n.lane==="app"?"#f3c3d6":"#cbd5e1"),"stroke-width":1.4}); }
  g.append(shape); const tc=n.type==="terminal"?"#fff":"#172033"; const titleY=n.type==="decision"?n.y+n.h/2-3:n.y+n.h/2-(n.detail?4:-4); g.append(el("text",{x:n.x+n.w/2,y:titleY,"text-anchor":"middle",class:"label",fill:tc},n.title)); if(n.detail)g.append(el("text",{x:n.x+n.w/2,y:titleY+19,"text-anchor":"middle",class:"detail"},n.detail)); g.onmousedown=startDrag; g.onclick=e=>{e.stopPropagation(); if(edgeMode){ connectNode(n.id); return;} selected={kind:"node",id:n.id};render();}; svg.append(g);
}
let dragging=null;
function svgPoint(event){ const r=svg.getBoundingClientRect(); const vb=svg.viewBox.baseVal; return {x:(event.clientX-r.left)*vb.width/r.width,y:(event.clientY-r.top)*vb.height/r.height}; }
function startDrag(e){ if(edgeMode)return; const id=e.currentTarget.dataset.id; const n=nodeById(id); snapshot(); dragging={id,dx:svgPoint(e).x-n.x,dy:svgPoint(e).y-n.y}; selected={kind:"node",id}; window.addEventListener("mousemove",moveDrag);window.addEventListener("mouseup",stopDrag,{once:true}); }
function moveDrag(e){ if(!dragging)return; const n=nodeById(dragging.id),p=svgPoint(e),i=laneIndex(n.lane),minX=left+i*laneW+10,maxX=left+(i+1)*laneW-n.w-10; n.x=Math.max(minX,Math.min(maxX,p.x-dragging.dx)); n.y=Math.max(135,Math.min(fitScene()-n.h-20,p.y-dragging.dy)); render(); }
function stopDrag(){dragging=null;window.removeEventListener("mousemove",moveDrag);}
function renderInspector(){
  if(!selected){inspector.innerHTML='<div class="empty">请选择一个节点或连线</div>';return;}
  if(selected.kind==="node"){ const n=nodeById(selected.id); if(!n)return; inspector.innerHTML=`<div class="field"><label>节点类型</label><select data-k="type"><option value="process">处理（矩形）</option><option value="decision">判断（菱形）</option><option value="terminal">开始/结束（胶囊）</option></select></div><div class="field"><label>标题</label><input data-k="title" value="${esc(n.title)}"></div><div class="field"><label>说明</label><textarea data-k="detail">${esc(n.detail)}</textarea></div><div class="pair"><div class="field"><label>所属泳道</label><select data-k="lane">${state.lanes.map(l=>`<option value="${l.id}">${l.label}</option>`).join("")}</select></div><div class="field"><label>节点 ID</label><input data-k="id" value="${esc(n.id)}"></div></div><div class="panel-note">拖拽节点可以调整位置。改变节点 ID 会同步更新相连的连线。</div>`; inspector.querySelector('[data-k="type"]').value=n.type;inspector.querySelector('[data-k="lane"]').value=n.lane; bindNodeFields(n); }
  else { const idx=+selected.id.replace("edge-",""),e=scene().edges[idx]; if(!e)return; inspector.innerHTML=`<div class="field"><label>起点节点</label><select data-k="from">${nodeOptions(e[0])}</select></div><div class="field"><label>终点节点</label><select data-k="to">${nodeOptions(e[1])}</select></div><div class="field"><label>连线标签（如：是 / 否）</label><input data-k="label" value="${esc(e[2])}"></div><div class="field"><label>线条语义</label><select data-k="style"><option value="solid">主流程</option><option value="dashed">系统通知 / 后续动作</option><option value="money">资金到账</option><option value="error">异常 / 否分支</option></select></div>`; inspector.querySelector('[data-k="style"]').value=e[3]; bindEdgeFields(idx); }
}
function esc(s=""){return String(s).replaceAll("&","&amp;").replaceAll('"',"&quot;").replaceAll("<","&lt;");}
function nodeOptions(selectedId){return scene().nodes.map(n=>`<option value="${n.id}" ${n.id===selectedId?"selected":""}>${esc(n.title)} · ${n.id}</option>`).join("");}
function bindNodeFields(n){ inspector.querySelectorAll("[data-k]").forEach(input=>input.onchange=()=>{snapshot();const k=input.dataset.k,v=input.value;if(k==="id"){if(scene().nodes.some(x=>x!==n&&x.id===v)||!v){alert("节点 ID 不能为空且必须唯一");input.value=n.id;return;}scene().edges.forEach(e=>{if(e[0]===n.id)e[0]=v;if(e[1]===n.id)e[1]=v;});n.id=v;selected.id=v;}else {n[k]=v;if(k==="lane"){const i=laneIndex(v);n.x=left+i*laneW+30;}}render(); }); }
function bindEdgeFields(index){ inspector.querySelectorAll("[data-k]").forEach(input=>input.onchange=()=>{snapshot();scene().edges[index][{from:0,to:1,label:2,style:3}[input.dataset.k]]=input.value;render();});}
function addNode(type){snapshot();const id=`node-${Date.now()}`,lane="app",n={id,type,lane,x:50,y:150,w:type==="decision"?230:210,h:type==="decision"?80:58,title:type==="decision"?"是否满足条件？":type==="terminal"?"开始 / 结束":"新增处理节点",detail:type==="process"?"请填写说明":""};scene().nodes.push(n);selected={kind:"node",id};render();}
function connectNode(id){ if(!edgeMode){edgeMode=id;statusEl.textContent="已选起点，请点击终点节点";return;} if(edgeMode===id)return; snapshot();scene().edges.push([edgeMode,id,"","solid"]);selected={kind:"edge",id:`edge-${scene().edges.length-1}`};edgeMode=null;statusEl.textContent="已新增连线";render(); }
function deleteSelected(){if(!selected)return; snapshot();if(selected.kind==="node"){const id=selected.id;scene().nodes=scene().nodes.filter(n=>n.id!==id);scene().edges=scene().edges.filter(e=>e[0]!==id&&e[1]!==id);}else scene().edges.splice(+selected.id.replace("edge-",""),1);selected=null;render();}
function downloadPng(){ const clone=svg.cloneNode(true);clone.querySelectorAll(".selected").forEach(x=>x.classList.remove("selected"));const xml=new XMLSerializer().serializeToString(clone),blob=new Blob([xml],{type:"image/svg+xml"}),url=URL.createObjectURL(blob),img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=2360;c.height=Math.ceil(2360*fitScene()/1180);const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);const a=document.createElement("a");a.download=`${scene().title}.png`;a.href=c.toDataURL("image/png");a.click();URL.revokeObjectURL(url);};img.src=url;}
function currentHtml(){ const html=document.documentElement.outerHTML; return html.replace(/const INITIAL_DATA = \{[\s\S]*?\n\};\n\nconst svg/,`const INITIAL_DATA = ${JSON.stringify(state,null,2)};\n\nconst svg`); }
function downloadHtml(){const a=document.createElement("a");a.download="微信自动到账-分场景流程图.html";a.href=URL.createObjectURL(new Blob([currentHtml()],{type:"text/html;charset=utf-8"}));a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);}
async function openFile(){if(!window.showOpenFilePicker){statusEl.textContent="当前浏览器不支持直接写回，请使用下载 HTML";return;}try{[fileHandle]=await window.showOpenFilePicker({types:[{description:"HTML 文件",accept:{"text/html":[".html"]}}]});statusEl.textContent=`已选择：${fileHandle.name}`;}catch{}}
async function saveFile(){if(!fileHandle){await openFile();if(!fileHandle)return;}try{const writable=await fileHandle.createWritable();await writable.write(currentHtml());await writable.close();statusEl.textContent=`已保存到 ${fileHandle.name} · ${new Date().toLocaleTimeString()}`;}catch(e){statusEl.textContent="保存失败，请确认文件写入权限";}}
document.getElementById("addProcess").onclick=()=>addNode("process");document.getElementById("addDecision").onclick=()=>addNode("decision");document.getElementById("addStart").onclick=()=>addNode("terminal");document.getElementById("connect").onclick=()=>{edgeMode=null;statusEl.textContent="新增连线：请先点击起点节点";};document.getElementById("delete").onclick=deleteSelected;document.getElementById("undo").onclick=undo;document.getElementById("redo").onclick=redo;document.getElementById("openFile").onclick=openFile;document.getElementById("saveFile").onclick=saveFile;document.getElementById("downloadHtml").onclick=downloadHtml;document.getElementById("exportPng").onclick=downloadPng;document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{sceneId=b.dataset.scene;selected=null;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("selected",x===b));render();});svg.onclick=()=>{selected=null;edgeMode=null;render();};window.addEventListener("keydown",e=>{if((e.metaKey||e.ctrlKey)&&e.key==="z"){e.preventDefault();e.shiftKey?redo():undo();}if((e.key==="Delete"||e.key==="Backspace")&&document.activeElement===document.body)deleteSelected();});render();
</script>
</body>
